services:
  # Next.js Application
  app:
    image: trash-track-app:latest
    container_name: trash-track-app
    env_file:
      - .env
    networks:
      - trash-track-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: trash-track-nginx:latest
    container_name: trash-track-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - trash-track-network
    restart: unless-stopped

networks:
  trash-track-network:
    driver: bridge

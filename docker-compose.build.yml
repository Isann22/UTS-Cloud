services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=${DATABASE_URL}
        - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
        - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
        - AWS_REGION=${AWS_REGION}
        - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}
    image: trash-track-app:latest
    container_name: trash-track-app

  # Nginx Reverse Proxy
  nginx:
    build:
      context: ./nginx
      dockerfile_inline: |
        FROM nginx:alpine
        COPY nginx.conf /etc/nginx/nginx.conf
    image: trash-track-nginx:latest
    container_name: trash-track-nginx

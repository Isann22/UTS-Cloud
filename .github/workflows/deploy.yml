name: Build and Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Inject env
        run: |
          cat > .env << EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=${{ secrets.AWS_REGION }}
          AWS_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
          NODE_ENV=production
          EOF

      - name: Build docker compose
        run: |
          docker compose -f docker-compose.build.yml build
          docker save trash-track-app:latest trash-track-nginx:latest | gzip > images.tar.gz

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "images.tar.gz,docker-compose.yml,nginx"
          target: "~/trash-track"
          strip_components: 0

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/trash-track
            
            # Create .env file from GitHub Secrets
            cat > .env << EOF
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }}
            NODE_ENV=production
            EOF
            
            # Stop and remove old containers
            docker compose down
            
            # Clean up old Docker images and containers to free space
            echo "Cleaning up old Docker resources..."
            docker system prune -af --volumes
            
            # Load new Docker images
            docker load < images.tar.gz
            rm images.tar.gz
            
            # Start containers
            docker compose up -d
            
            # Wait for containers to be ready
            echo "Waiting for containers to be ready..."
            sleep 5
            
            # Run database migrations
            echo "Running database migrations..."
            docker compose exec -T app npm run db:push
            
            echo "Creating admin user..."
            docker compose exec -T app npm run create-admin 
            
            # Show container status
            docker compose ps
            echo "Deployment completed successfully!"
